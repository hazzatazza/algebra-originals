<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Don't Let Ehren Out</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { display: block; background: #111; }
        
        /* UI Top Bar */
        #ui-layer { 
            position: absolute; top: 0; width: 100%; height: 80px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; box-sizing: border-box; pointer-events: none; z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .stat-box { font-size: 1.8vw; font-weight: 900; text-shadow: 2px 2px #000; }
        .p1-color { color: #4caf50; }
        .p2-color { color: #2196f3; }
        .game-header { font-size: 2.8vw; font-weight: 900; color: #ffeb3b; text-transform: uppercase; letter-spacing: 5px; text-shadow: 3px 3px 0 #d32f2f; }

        /* Clean Gradient Menu */
        #menu-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(135deg, #2e0b3e 0%, #1a2f1a 100%);
            z-index: 100; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Huge Swaying Ehren */
        .ehren-container {
            position: relative;
            animation: sway 2.5s ease-in-out infinite;
            margin-bottom: 20px;
            z-index: 5;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-8deg) scale(1.2); }
            50% { transform: rotate(8deg) scale(1.4); }
        }

        .menu-title { font-size: 6vw; color: #ffeb3b; margin-bottom: 20px; text-shadow: 6px 6px 0 #d32f2f; font-weight: 900; z-index: 10; text-transform: uppercase; }
        
        .menu-btn { 
            background: rgba(0, 0, 0, 0.7); 
            border: 4px solid #ffeb3b; 
            color: white; padding: 18px 45px; margin: 12px; 
            font-size: 2vw; cursor: pointer; border-radius: 20px; 
            transition: 0.2s; width: 420px; font-weight: bold; z-index: 10;
        }
        .menu-btn:hover { background: #ffeb3b; color: #000; transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 235, 59, 0.4); }
        
        #menu-img { width: 550px; height: 200px; object-fit: fill; pointer-events: none; }

        /* Bottom Corner Logo */
        #menu-logo {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: auto;
            z-index: 11;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="menu-overlay">
        <div class="menu-title">DON'T LET EHREN OUT</div>
        
        <div class="ehren-container">
            <img id="menu-img" src="https://iili.io/B2uLPdx.png" alt="Ehren">
        </div>

        <button class="menu-btn" onclick="startGame('1P')">SINGLE PLAYER (vs AI)</button>
        <button class="menu-btn" onclick="startGame('2P')">TWO PLAYER (LOCAL)</button>
        <p style="color: #fff; margin-top: 15px; font-weight: bold; text-shadow: 2px 2px #000; z-index: 10;">P1: W/S | P2: UP/DOWN</p>
        
        <img id="menu-logo" src="https://iili.io/q4IJf9a.png" alt="Logo">
    </div>

    <div id="ui-layer" style="display: none;">
        <div class="stat-box p1-color">P1 MISSES: <span id="p1-miss">0</span>/3</div>
        <div class="game-header">DON'T LET EHREN OUT</div>
        <div class="stat-box p2-color">P2 MISSES: <span id="p2-miss">0</span>/3</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu-overlay');
        const ui = document.getElementById('ui-layer');

        let gameMode = '1P';
        let isPlaying = false, gameOver = false;
        let p1Misses = 0, p2Misses = 0, speed = 6, offset = 0;
        let levels = [];
        
        const gL = { level: 1, x: 0 };
        const gR = { level: 1, x: 0 };
        const prisoner = { x: 0, y: 0, targetSide: 'left', targetLevel: 1, visualY: 0 };

        const ehrenImg = new Image();
        ehrenImg.src = 'https://iili.io/B2uLPdx.png';

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const margin = canvas.height * 0.22;
            const spacing = (canvas.height - (margin * 2)) / 2;
            levels = [margin, margin + spacing, margin + (spacing * 2)];
            gL.x = canvas.width * 0.15;
            gR.x = canvas.width * 0.85;
        }

        window.addEventListener('resize', resize);
        resize();

        function startGame(mode) {
            gameMode = mode;
            isPlaying = true;
            gameOver = false;
            p1Misses = 0; p2Misses = 0; speed = 6;
            document.getElementById('p1-miss').innerText = '0';
            document.getElementById('p2-miss').innerText = '0';
            menu.style.display = 'none';
            ui.style.display = 'flex';
            resetPrisoner();
            requestAnimationFrame(draw);
        }

        function drawEnvironment() {
            offset = (offset + speed * 0.5) % 100;
            levels.forEach(y => {
                ctx.fillStyle = '#222';
                ctx.fillRect(0, y - (canvas.height * 0.1), canvas.width, canvas.height * 0.2);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                for(let i = -offset; i < canvas.width; i += 50) {
                    ctx.beginPath(); ctx.moveTo(i, y - (canvas.height * 0.1)); ctx.lineTo(i, y + (canvas.height * 0.1)); ctx.stroke();
                }
                ctx.fillStyle = '#f00'; ctx.globalAlpha = 0.15;
                ctx.fillRect(0, y - (canvas.height * 0.1), 80, canvas.height * 0.2); 
                ctx.fillRect(canvas.width - 80, y - (canvas.height * 0.1), 80, canvas.height * 0.2); 
                ctx.globalAlpha = 1.0;
            });
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, levels[0] + (canvas.height * 0.1), canvas.width, (levels[1] - levels[0]) - (canvas.height * 0.2));
            ctx.fillRect(0, levels[1] + (canvas.height * 0.1), canvas.width, (levels[2] - levels[1]) - (canvas.height * 0.2));
        }

        function updateAI() {
            if (gameMode === '1P' && prisoner.targetSide === 'right') {
                // AI Difficulty: Reacts at mid-screen now instead of the very edge
                if (prisoner.x > canvas.width * 0.6) {
                    // Increased reaction chance for more challenge
                    let reactionChance = 0.05 + (speed * 0.0015); 
                    if (Math.random() < reactionChance) {
                        gR.level = prisoner.targetLevel;
                    }
                }
            }
        }

        function checkBlock(g) {
            if (g.level === prisoner.targetLevel) {
                speed += 0.45;
                resetPrisoner();
            } else if (prisoner.x < -150 || prisoner.x > canvas.width + 150) {
                if (prisoner.targetSide === 'left') p1Misses++;
                else p2Misses++;
                document.getElementById('p1-miss').innerText = p1Misses;
                document.getElementById('p2-miss').innerText = p2Misses;
                if (p1Misses >= 3 || p2Misses >= 3) gameOver = true;
                resetPrisoner();
            }
        }

        function resetPrisoner() {
            prisoner.x = canvas.width / 2;
            prisoner.targetSide = Math.random() > 0.5 ? 'left' : 'right';
            prisoner.targetLevel = Math.floor(Math.random() * 3);
        }

        function draw() {
            if (!isPlaying) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawEnvironment();

            const bH = canvas.height * 0.18; const sW = bH * 2.8; 
            ctx.save();
            ctx.translate(prisoner.x, prisoner.visualY);
            if (prisoner.targetSide === 'left') ctx.scale(-1, 1);
            ctx.drawImage(ehrenImg, -sW / 2, -bH / 2, sW, bH);
            ctx.restore();

            prisoner.visualY += (levels[prisoner.targetLevel] - prisoner.visualY) * 0.15;

            if (!gameOver) {
                updateAI();
                if (prisoner.targetSide === 'left') {
                    prisoner.x -= speed;
                    if (prisoner.x <= gL.x + 40) checkBlock(gL);
                } else {
                    prisoner.x += speed;
                    if (prisoner.x >= gR.x - 40) checkBlock(gR);
                }
            }

            const emojiSize = canvas.height * 0.12;
            ctx.font = `${emojiSize}px serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("👮‍♂️", gL.x, levels[gL.level]);
            ctx.save(); ctx.translate(gR.x, levels[gR.level]); ctx.scale(-1, 1); ctx.fillText("👮‍♂️", 0, 0); ctx.restore();

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(0,0,canvas.width, canvas.height);
                ctx.fillStyle = '#ff4444'; ctx.font = 'bold 8vw sans-serif';
                let txt = p1Misses >= 3 ? "P2 WINS!" : "P1 WINS!";
                if (gameMode === '1P') txt = p1Misses >= 3 ? "AI DOMINATED" : "AI DEFEATED";
                ctx.fillText(txt, canvas.width/2, canvas.height/2);
                ctx.fillStyle = '#fff'; ctx.font = '2vw sans-serif';
                ctx.fillText("Press R to return to Menu", canvas.width/2, canvas.height/2 + 100);
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (k === 'w' && gL.level > 0) gL.level--;
            if (k === 's' && gL.level < 2) gL.level++;
            if (gameMode === '2P') {
                if (e.key === 'ArrowUp' && gR.level > 0) gR.level--;
                if (e.key === 'ArrowDown' && gR.level < 2) gR.level++;
            }
            if (k === 'r' && (gameOver || !isPlaying)) {
                isPlaying = false;
                menu.style.display = 'flex';
                ui.style.display = 'none';
            }
        });
    </script>
</body>
</html>
